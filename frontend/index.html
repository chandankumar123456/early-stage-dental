<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caries Detection UI</title>
    <style>
        :root {
            --bg: #f3f4f7;
            --card: #ffffff;
            --line: #d9dde3;
            --text: #111827;
            --muted: #6b7280;
            --teal: #0b7a78;
            --danger: #b42525;
            --success: #166534;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 18px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 6px 22px rgba(15, 23, 42, 0.04);
        }

        .header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            margin: 0;
            font-size: 28px;
        }

        .meta {
            color: var(--muted);
            font-size: 14px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .content {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 18px;
        }

        .stage {
            padding: 16px;
        }

        .preview {
            border-radius: 12px;
            border: 1px solid var(--line);
            min-height: 360px;
            background: #0c223b;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .fallback {
            color: #d5edf0;
            font-weight: 600;
            letter-spacing: .4px;
            padding: 16px;
            text-align: center;
        }

        .controls {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .status {
            color: var(--muted);
            font-size: 14px;
            width: 100%;
        }

        input[type="file"] {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px;
            background: #fff;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: var(--teal);
            color: #fff;
        }

        button:disabled {
            opacity: .65;
            cursor: not-allowed;
        }

        .result {
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        .label {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .finding {
            margin: 4px 0 0;
            font-size: 30px;
            color: var(--danger);
        }

        .progress {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: #d4dae0;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress > span {
            display: block;
            height: 100%;
            background: var(--teal);
            width: 0;
        }

        @media (max-width: 900px) {
            .content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <section class="panel header">
            <h1 class="title">Early-Stage Dental Caries Detection</h1>
            <div class="meta">
                <span id="healthText">Backend: Checking...</span>
                <span id="modelText">Model: Loading...</span>
            </div>
        </section>

        <section class="content">
            <article class="panel stage">
                <div class="preview">
                    <div class="fallback" id="fallback">Choose an X-ray image to preview it here.</div>
                    <img id="previewImage" alt="X-ray preview" hidden />
                </div>
                <div class="controls">
                    <input type="file" id="fileInput" accept="image/*" />
                    <button id="predictBtn">Run Prediction</button>
                    <div class="status" id="statusText">This UI supports only backend operations: health, metrics, and predict.</div>
                </div>
            </article>

            <aside class="panel result">
                <div>
                    <p class="label">Prediction</p>
                    <h2 class="finding" id="predictionText">Awaiting prediction</h2>
                </div>
                <div>
                    <p class="label">Confidence</p>
                    <strong id="confidenceText">--%</strong>
                    <div class="progress"><span id="confidenceBar"></span></div>
                </div>
                <div>
                    <p class="label">Model status</p>
                    <strong id="modelStatusText">Loading...</strong>
                </div>
            </aside>
        </section>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const predictBtn = document.getElementById("predictBtn");
        const previewImage = document.getElementById("previewImage");
        const fallback = document.getElementById("fallback");
        const statusText = document.getElementById("statusText");
        const predictionText = document.getElementById("predictionText");
        const confidenceText = document.getElementById("confidenceText");
        const confidenceBar = document.getElementById("confidenceBar");
        const healthText = document.getElementById("healthText");
        const modelText = document.getElementById("modelText");
        const modelStatusText = document.getElementById("modelStatusText");

        function formatConfidence(rawConfidence) {
            const numeric = Number(rawConfidence);
            if (!Number.isFinite(numeric)) return 0;
            const ratio = numeric > 1 ? numeric / 100 : numeric;
            return Math.max(0, Math.min(100, Math.round(ratio * 100)));
        }

        async function loadBackendInfo() {
            try {
                const [healthRes, metricsRes] = await Promise.all([
                    fetch("/api/health"),
                    fetch("/api/metrics")
                ]);

                if (healthRes.ok) {
                    const health = await healthRes.json();
                    healthText.textContent = `Backend: ${health.status === "ok" ? "Online" : "Unavailable"}`;
                } else {
                    healthText.textContent = "Backend: Unavailable";
                }

                if (metricsRes.ok) {
                    const metrics = await metricsRes.json();
                    modelText.textContent = `Model: ${metrics.model || "Unknown"}`;
                    modelStatusText.textContent = metrics.status || "unknown";
                } else {
                    modelText.textContent = "Model: Unavailable";
                    modelStatusText.textContent = "unavailable";
                }
            } catch (error) {
                healthText.textContent = "Backend: Offline";
                modelText.textContent = "Model: Unavailable";
                modelStatusText.textContent = "unavailable";
                statusText.textContent = "Backend is not reachable. Start FastAPI server to use prediction.";
            }
        }

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];
            if (!file) return;

            const objectUrl = URL.createObjectURL(file);
            previewImage.src = objectUrl;
            previewImage.hidden = false;
            fallback.hidden = true;
            statusText.textContent = `Loaded ${file.name}. Click 'Run Prediction' to call /api/predict.`;
        });

        predictBtn.addEventListener("click", async () => {
            const file = fileInput.files[0];
            if (!file) {
                statusText.textContent = "Please choose an image before running prediction.";
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            predictBtn.disabled = true;
            predictBtn.textContent = "Processing...";

            try {
                const response = await fetch("/api/predict", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Prediction failed (${response.status}): ${errorText}`);
                }

                const data = await response.json();
                const confidencePercent = formatConfidence(data.confidence);
                const prediction = data.prediction || "Unknown";

                predictionText.textContent = prediction;
                predictionText.style.color = prediction === "No Caries" ? "var(--success)" : "var(--danger)";
                confidenceText.textContent = `${confidencePercent}%`;
                confidenceBar.style.width = `${confidencePercent}%`;
                statusText.textContent = "Prediction completed successfully.";
            } catch (error) {
                statusText.textContent = error.message;
            } finally {
                predictBtn.disabled = false;
                predictBtn.textContent = "Run Prediction";
            }
        });

        loadBackendInfo();
    </script>
</body>
</html>
